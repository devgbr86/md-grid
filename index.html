<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>CodexPRO</title>
     <link rel="icon" type="image/png" href="orange_cube.png" />
     <link rel="stylesheet" href="main.css" />
</head>

<body>

     <!-- ── Navbar ── -->
     <nav id="navbar">
          <a id="nav-logo-link" href="javascript:void(0)" onclick="window.location.reload()" title="MD Grid — home">
               <img src="orange_cube.png" alt="Codex PRO icon" />
               <span class="site-title">CodexPRO</span>
          </a>
     </nav>

     <!-- ── Layout ── -->
     <div id="wrapper">

          <!-- Sidebar file tree -->
          <aside id="sidebar">
               <div id="sidebar-tree"></div>
          </aside>

          <!-- Main content -->
          <main id="main">

               <!-- Back button -->
               <button id="back-btn" title="Back to home">&#8592; Back</button>

               <!-- Home view: category grid -->
               <section id="home-view">
                    <h1>CodexPRO</h1>
                    <p class="lead">
                         A central index of personal documents and projects.<br>
                         Select a category below to browse articles.
                    </p>
                    <div class="category-grid" id="category-grid">
                         <!-- Built by main.js -->
                    </div>
               </section>

               <!-- Article view: rendered markdown -->
               <section id="article-view">
                    <h1 class="article-title" id="article-title"></h1>
                    <div id="article-content"></div>
               </section>

          </main>
     </div>

     <!-- ── Footer ── -->
     <footer id="footer">
          <span>&copy; CodexPRO &mdash;</span>
          <a href="https://github.com/devgbr86" target="_blank" rel="noopener">github.com/devgbr86</a>
     </footer>

     <script src="main.js"></script>
</body>

</html>
